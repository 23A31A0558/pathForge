<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathForge - Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f4f6f8; }
        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .friend-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .friend-list-item:last-child {
            border-bottom: none;
        }
        .progress-bar-custom {
            height: 10px;
            border-radius: 5px;
            background-color: #e9ecef;
            overflow: hidden;
            width: 150px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 5px;
            transition: width 1s ease-out;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom px-4" style="background-color: var(--primary-color);">
        <a class="navbar-brand brand-logo text-white m-0 p-0" href="dashboard.html">Path<span style="color: var(--accent-color);">Forge</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto flex-row d-flex align-items-center mt-3 mt-lg-0 gap-3">
                <a href="roadmap.html" class="text-white text-decoration-none">Roadmaps</a>
                <a href="leaderboard.html" class="text-white text-decoration-none">Leaderboard</a>
                <a href="friends.html" class="text-white text-decoration-none"><strong style="color: var(--accent-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 2px;">Friends</strong></a>
                <a href="groups.html" class="text-white text-decoration-none">Groups</a>
                <span class="text-white d-none d-lg-inline fw-semibold mx-2" id="userDisplay">...</span>
                <button class="btn btn-sm btn-outline-light rounded-pill" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-4">
                <div class="section-card">
                    <h4 class="mb-4 text-primary fw-bold">Add Friend</h4>
                    <form id="addFriendForm">
                        <div class="mb-3">
                            <label for="friendUsername" class="form-label text-muted small fw-medium">Student Username</label>
                            <input type="text" class="form-control" id="friendUsername" placeholder="e.g. johndoe" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-medium">Send Request</button>
                    </form>
                    <div id="addFriendMsg" class="mt-3 small text-center fw-medium"></div>
                </div>

                <div class="section-card">
                    <h4 class="mb-4 text-primary fw-bold">Pending Requests</h4>
                    <div id="pendingRequestsContainer">
                        <div class="text-muted small text-center py-3">No pending requests.</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="section-card">
                    <h4 class="mb-4 text-primary fw-bold">Friends Progress</h4>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr class="text-muted text-uppercase small" style="font-size: 0.85rem">
                                    <th>Student</th>
                                    <th>Path</th>
                                    <th>Score</th>
                                    <th>Progress</th>
                                </tr>
                            </thead>
                            <tbody id="friendsProgressContainer">
                                <tr><td colspan="4" class="text-muted text-center py-5">You have no friends on PathForge yet. Add some to join forces!</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/friends.js"></script>
</body>
</html>
