<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathForge - Questionnaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .question-section {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }
        .form-check-input:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom px-4" style="background-color: var(--primary-color);">
        <a class="navbar-brand brand-logo text-white m-0 p-0" href="#">Path<span style="color: var(--accent-color);">Forge</span></a>
        <div class="ms-auto flex-row d-flex align-items-center">
            <button class="btn btn-sm btn-outline-light" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="container mt-5 mb-5" style="max-width: 700px;">
        <div class="text-center mb-5">
            <h2>Personalize Your Path</h2>
            <p class="text-muted">Tell us a bit about yourself so we can tailor your learning experience.</p>
        </div>

        <form id="questionnaireForm">
            <div id="questionsContainer">
                <div class="text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>

            <div id="formError" class="alert alert-danger d-none" role="alert">
                Please answer all questions before submitting.
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fs-5 mt-3 d-none" id="submitBtn">Generate My Path</button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/questionnaire.js"></script>
</body>
</html>
