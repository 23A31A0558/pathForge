<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathForge - My Roadmaps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .roadmap-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            padding: 1.5rem;
        }
        .accordion-button:not(.collapsed) {
            background-color: var(--accent-color);
            color: #fff;
        }
        .difficulty-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .diff-easy { color: #10B981; background-color: #D1FAE5; }
        .diff-medium { color: #F59E0B; background-color: #FEF3C7; }
        .diff-hard { color: #EF4444; background-color: #FEE2E2; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom px-4" style="background-color: var(--primary-color);">
        <a class="navbar-brand brand-logo text-white m-0 p-0" href="dashboard.html">Path<span style="color: var(--accent-color);">Forge</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto flex-row d-flex align-items-center mt-3 mt-lg-0 gap-3">
                <a href="roadmap.html" class="text-white text-decoration-none"><strong style="color: var(--accent-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 2px;">Roadmaps</strong></a>
                <a href="leaderboard.html" class="text-white text-decoration-none">Leaderboard</a>
                <a href="friends.html" class="text-white text-decoration-none">Friends</a>
                <a href="groups.html" class="text-white text-decoration-none">Groups</a>
                <a href="questionnaire.html" class="btn btn-sm btn-outline-light rounded-pill">Retake Quiz</a>
                <button class="btn btn-sm btn-outline-danger rounded-pill" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5 border-0">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Your Personalized Paths</h2>
            <p class="text-muted">Based on your goals, we generated two potential roadmaps for you.</p>
        </div>

        <!-- Suggestions Section -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-8">
                <div class="card p-4 shadow-sm border-0 bg-light">
                    <h5 class="fw-bold mb-3"><i class="bi bi-stars text-primary"></i> Suggestions for You</h5>
                    <ul id="suggestionsContainer" class="mb-0 text-muted">
                    </ul>
                </div>
            </div>
        </div>

        <!-- Progress Section -->
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 text-center">
                <div class="card p-3 shadow-sm border-0">
                    <h5 class="fw-bold mb-2">Total Score: <span id="userScore" class="text-success fs-4">0</span></h5>
                    <div class="progress" style="height: 20px;">
                        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                    </div>
                    <small class="text-muted mt-2">Complete steps sequentially to increase your score.</small>
                </div>
            </div>
        </div>

        <div id="loadingIndicator" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading or Generating...</span>
            </div>
            <p class="mt-3 text-muted">Retrieving your master plan...</p>
        </div>

        <div id="roadmapContainer" class="row">
            <!-- Roadmaps dynamically appended here -->
        </div>
    </div>

    <!-- Bootstrap Bundle with JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/roadmap.js"></script>
</body>
</html>
