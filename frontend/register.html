<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathForge - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container d-flex flex-column justify-content-center flex-grow-1">
        <div class="text-center mb-4">
            <h1 class="brand-logo">Path<span>Forge</span></h1>
            <p class="text-muted">Create an account to start your learning journey.</p>
        </div>

        <div class="auth-container mt-0">
            <div class="card p-4">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="registerUsername" class="form-label fw-medium">Username</label>
                        <input type="text" class="form-control" id="registerUsername" placeholder="Choose a username">
                        <div class="invalid-feedback">Username is required.</div>
                    </div>
                    <div class="mb-3">
                        <label for="registerEmail" class="form-label fw-medium">Email Address</label>
                        <input type="email" class="form-control" id="registerEmail" placeholder="Enter your email">
                        <div class="invalid-feedback">Please enter a valid email address.</div>
                    </div>
                    <div class="mb-3">
                        <label for="registerPassword" class="form-label fw-medium">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="registerPassword" placeholder="Create a password">
                            <button class="btn btn-outline-secondary" type="button" id="toggleRegisterPassword">Show</button>
                            <div class="invalid-feedback">Password is required.</div>
                        </div>
                    </div>
                    <div id="registerMessage" class="alert d-none py-2" role="alert"></div>
                    <button type="submit" class="btn btn-primary w-100 mt-2">Create Account</button>
                </form>
                <div class="text-center mt-3">
                    <p class="mb-0 text-muted">Already have an account? <a href="login.html">Login</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
