<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathForge - Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f4f6f8; }
        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .progress-bar-custom {
            height: 10px;
            border-radius: 5px;
            background-color: #e9ecef;
            overflow: hidden;
            width: 150px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 5px;
            transition: width 1s ease-out;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom px-4" style="background-color: var(--primary-color);">
        <a class="navbar-brand brand-logo text-white m-0 p-0" href="dashboard.html">Path<span style="color: var(--accent-color);">Forge</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto flex-row d-flex align-items-center mt-3 mt-lg-0 gap-3">
                <a href="roadmap.html" class="text-white text-decoration-none">Roadmaps</a>
                <a href="leaderboard.html" class="text-white text-decoration-none">Leaderboard</a>
                <a href="friends.html" class="text-white text-decoration-none">Friends</a>
                <a href="groups.html" class="text-white text-decoration-none"><strong style="color: var(--accent-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 2px;">Groups</strong></a>
                <span class="text-white d-none d-lg-inline fw-semibold mx-2" id="userDisplay">...</span>
                <button class="btn btn-sm btn-outline-light rounded-pill" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-4">
                <div class="section-card">
                    <h4 class="mb-4 text-primary fw-bold">Create Group</h4>
                    <form id="createGroupForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-medium">Group Name</label>
                            <input type="text" class="form-control" id="groupName" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-medium">Domain</label>
                            <select class="form-select" id="groupDomain" required>
                                <option value="backend">Backend</option>
                                <option value="frontend">Frontend</option>
                                <option value="ai">AI/Data</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-medium">Create</button>
                    </form>
                    <div id="createGroupMsg" class="mt-3 small text-center fw-medium"></div>
                </div>

                <div class="section-card">
                    <h4 class="mb-4 text-primary fw-bold">Join a Group</h4>
                    <div id="availableGroupsContainer" class="list-group list-group-flush" style="max-height: 400px; overflow-y: auto;">
                        <div class="text-muted small text-center py-3">Loading groups...</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="section-card mb-3">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center">
                        <h4 class="mb-3 mb-md-0 text-primary fw-bold">Group Dashboard</h4>
                        <select id="myGroupsSelect" class="form-select w-auto">
                            <option value="">Select a group...</option>
                        </select>
                    </div>
                </div>
                
                <div class="section-card">
                    <h5 id="currentGroupName" class="mb-4 fw-bold">Select a group to view progress</h5>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr class="text-muted text-uppercase small" style="font-size: 0.85rem">
                                    <th>Rank</th>
                                    <th>Student</th>
                                    <th>Score</th>
                                    <th>Progress</th>
                                </tr>
                            </thead>
                            <tbody id="groupMembersContainer">
                                <tr><td colspan="4" class="text-muted text-center py-5">No group selected.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/groups.js"></script>
</body>
</html>
